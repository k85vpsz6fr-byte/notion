<script>
  const entries = [
    {
      label: 'family size',
      content: '父 183cm｜母 167cm｜私 169cm｜弟 189cm<br>4人で歩くとかなり目立ちます。はぐれません。'
    },
    {
      label: 'food',
      content: 'pizza｜sushi｜fruits<br>肉類はかなり苦手です'
    },
    {
      label: 'club history',
      content: '音楽部 → 帰宅部 → 合唱<br>帰宅部まじで極めてました。'
    },
    {
      label: 'playlist',
      content: 'Mrs. GREEN APPLE｜RADWIMPS｜SEVENTEEN｜IU｜Charlie Puth｜Sia'
    },
    {
      label: 'anime',
      content: 'かなり無知です。<br>進撃を見始めました。<br>おすすめ募集中。'
    },
    {
      label: 'drama mode',
      content: 'クールごとにほぼ全ドラマ1話視聴。<br>継続するか判断しています。'
    },
    {
      label: 'current season',
      content: 'リボーン｜田鎖ブラザーズ'
    },
    {
      label: 'line stamp collection',
      content: '癖の強いLINEスタンプを集めています。<br>おすすめ：アメリカにいそうなマッチョ'
    },
    {
      label: 'recommended spot',
      content: 'LEGOLAND<br>魅力を永遠に語れます。'
    },
    {
      label: 'location',
      content: '名古屋市東区｜千種駅付近<br>母の飯をタダで食らう日々。'
    },
    {
      label: 'faculty',
      content: '教育学部<br>お盆以外ずっと1限で泣いています。'
    }
  ];

  const button = document.getElementById('drawButton');
  const card = document.getElementById('card');

  let collected = JSON.parse(localStorage.getItem('collectedCards') || '[]');

  function getRemaining() {
    return entries.filter(e => !collected.some(c => c.label === e.label));
  }

  function updateProgress() {
    document.querySelector('.title').textContent =
      `ARCHIVE ${collected.length} / ${entries.length}`;
  }

  button.addEventListener('click', () => {

    let remaining = getRemaining();

    if (remaining.length === 0) {
      card.innerHTML =
        '<div class="label">complete</div>' +
        '<div class="content">all entries collected.</div>';
      return;
    }

    const randomIndex = Math.floor(Math.random() * remaining.length);
    const random = remaining[randomIndex];

    collected.push(random);
    localStorage.setItem('collectedCards', JSON.stringify(collected));

    card.innerHTML =
      '<div class="label">' + random.label + '</div>' +
      '<div class="content">' + random.content + '</div>';

    updateProgress();
  });

  updateProgress();
</script>
