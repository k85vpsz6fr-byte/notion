<script>
  const entries = [
    {
      label: 'family size',
      content: '父 183cm｜母 167cm｜私 169cm｜弟 189cm\n4人で歩くとかなり目立ちます。はぐれません。'
    },

    {
      label: 'food',
      content: 'pizza｜sushi｜fruits\n肉類はかなり苦手です'
    },

    {
      label: 'club history',
      content: '音楽部 → 帰宅部 → 合唱\n帰宅部まじで極めてました。'
    },

    {
      label: 'playlist',
      content: 'Mrs. GREEN APPLE｜RADWIMPS｜SEVENTEEN｜IU｜Charlie Puth｜Sia'
    },

    {
      label: 'anime',
      content: 'かなり無知です。\n進撃を見始めました。\nおすすめ募集中。'
    },

    {
      label: 'drama mode',
      content: 'クールごとにほぼ全ドラマ1話視聴。\n継続するか判断しています。'
    },

    {
      label: 'current season',
      content: 'リボーン｜田鎖ブラザーズ'
    },

    {
      label: 'line stamp collection',
      content: '癖の強いLINEスタンプを集めています。\nおすすめ：アメリカにいそうなマッチョ'
    },

    {
      label: 'recommended spot',
      content: 'LEGOLAND\n魅力を永遠に語れます。'
    },

    {
      label: 'location',
      content: '名古屋市東区｜千種駅付近\n母の飯をタダで食らう日々。'
    },

    {
      label: 'faculty',
      content: '教育学部\n8月、お盆以外ずっと1限集中講義で泣いています。'
    }
  ];

  const button = document.getElementById('drawButton');
  const card = document.getElementById('card');

  let collected = [];

  function updateProgress() {
    document.querySelector('.title').textContent =
      `ARCHIVE ${collected.length} / ${entries.length}`;
  }

  button.addEventListener('click', () => {

    const remaining = entries.filter(
      entry => !collected.includes(entry.label)
    );

    if (remaining.length === 0) {
      card.innerHTML = `
        <div class="label">complete</div>
        <div class="content">
          all entries collected.
        </div>
      `;

      return;
    }

    const random =
      remaining[Math.floor(Math.random() * remaining.length)];

    collected.push(random.label);

    updateProgress();

    card.innerHTML = `
      <div class="label">${random.label}</div>
      <div class="content">${random.content}</div>
    `;

    card.style.animation = 'none';
    void card.offsetWidth;
    card.style.animation = 'fade 0.35s ease';
  });

  updateProgress();
</script>
